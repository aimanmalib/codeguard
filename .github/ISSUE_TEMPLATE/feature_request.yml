name: Feature request
description: Suggest an idea or improvement for CodeGuard
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that CodeGuard doesn't support today?
      placeholder: I want to use CodeGuard with <provider>, but ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe what you'd like to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other approaches you've thought about.
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New LLM provider preset
        - New review agent / agent improvement
        - New output format (SARIF, GitHub annotations, ...)
        - Language detection / CLI
        - Documentation
        - Other
    validations:
      required: true
